<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Professional systematic review dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI', Arial, sans-serif; background:#f0f2f5; color:#2d3436; padding:20px; }
h2 { color:#0984e3; margin-bottom:5px; }
p.description { margin-bottom:20px; font-size:14px; color:#636e72; }
.container { display:flex; flex-wrap:wrap; gap:20px; }
.left, .right { background:white; padding:20px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
.left { flex:1 1 60%; min-width:400px; }
.right { flex:1 1 35%; min-width:300px; }
select, input { padding:8px; margin:5px; border-radius:4px; border:1px solid #ccc; }
button { padding:8px 15px; border:none; border-radius:4px; background:#0984e3; color:white; cursor:pointer; }
button:hover { background:#0652dd; }
table { width:100%; border-collapse:collapse; margin-top:10px; }
th, td { padding:10px; border-bottom:1px solid #eee; font-size:14px; }
th { background:#0984e3; color:white; }
footer { margin-top:30px; text-align:center; font-size:13px; color:#636e72; }
</style>
</head>

<body>

<h2>Professional systematic review dashboard</h2>

<p class="description">
Search, screen, and summarize publications for systematic reviews.
</p>

<div class="container">
  <div class="left">

    <select id="searchType">
      <option value="keyword">Keyword</option>
      <option value="title">Title</option>
      <option value="author">Author</option>
      <option value="institution">Institution</option>
    </select>

    <input type="text" id="query" placeholder="Enter search">
    <button onclick="searchAll()">Search</button>
    <button onclick="downloadCSV()">Download CSV</button>

    <div id="summary"></div>

    <table>
      <thead>
        <tr>
          <th>Title</th>
          <th>Authors</th>
          <th>Year</th>
        </tr>
      </thead>
      <tbody id="results"></tbody>
    </table>

  </div>

  <div class="right">
    <canvas id="chart"></canvas>
  </div>
</div>

<!-- ✅ FOOTER WITH VISITOR COUNT -->
<footer>
  © Md. Abu Bokkor Shiddik, Begum Rokeya University, Bangladesh.
  <br>
  👀 Total Visitors: <span id="visitorCount">Loading...</span>
</footer>

<script>

// ================= VISITOR COUNTER =================
// 🔥 IMPORTANT: use your UNIQUE key (change name if you want)
async function updateVisitorCount() {
    try {
        let res = await fetch("https://api.countapi.xyz/hit/abs-shiddik-dashboard-2026/visits");
        let data = await res.json();
        document.getElementById("visitorCount").innerText = data.value;
    } catch {
        document.getElementById("visitorCount").innerText = "Error";
    }
}
updateVisitorCount();

// ================= SEARCH =================
let papers=[];

async function searchAll(){
    let query=document.getElementById("query").value;
    if(!query){ alert("Enter search"); return; }

    let res=await fetch(`https://api.crossref.org/works?rows=200&query=${query}`);
    let data=await res.json();

    papers=data.message.items.map(p=>({
        title:p.title?.[0]||"No title",
        authors:(p.author||[]).map(a=>a.family).join(", "),
        year:p.created?.["date-parts"]?.[0]?.[0]||""
    }));

    displayResults();
    drawChart();
}

// ================= DISPLAY =================
function displayResults(){
    let tbody=document.getElementById("results");
    tbody.innerHTML="";
    papers.forEach(p=>{
        let row=`<tr>
          <td>${p.title}</td>
          <td>${p.authors}</td>
          <td>${p.year}</td>
        </tr>`;
        tbody.innerHTML+=row;
    });
}

// ================= CSV =================
function downloadCSV(){
    let csv="Title,Authors,Year\n";
    papers.forEach(p=>{
        csv+=`"${p.title}","${p.authors}","${p.year}"\n`;
    });
    let blob=new Blob([csv]);
    let a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="papers.csv";
    a.click();
}

// ================= CHART =================
function drawChart(){
    let count={};
    papers.forEach(p=>{
        if(p.year) count[p.year]=(count[p.year]||0)+1;
    });

    new Chart(document.getElementById("chart"),{
        type:"bar",
        data:{
            labels:Object.keys(count),
            datasets:[{data:Object.values(count)}]
        }
    });
}

</script>

</body>
</html>
