<!DOCTYPE html>
<html>
<head>
  <title>Systematic review explorer</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; margin: 20px; }
    input { margin: 5px; padding: 5px; }
    button { margin: 5px; padding: 5px 10px; cursor: pointer; }
    #results div { margin-bottom: 15px; }
    canvas { margin-top: 20px; max-width: 800px; height: 400px; }
    hr { border: none; border-top: 1px solid #ccc; margin: 10px 0; }
  </style>
</head>
<body>

<h2>🔍 Systematic Review Explorer</h2>

<input type="text" id="query" placeholder="Enter keyword or Boolean query">
<input type="number" id="yearFrom" placeholder="From Year">
<input type="number" id="yearTo" placeholder="To Year">

<button onclick="searchAll()">Search</button>
<button onclick="downloadCSV()">Download CSV</button>

<h3 id="summary"></h3>

<div id="results"></div>

<canvas id="trendChart"></canvas>
<canvas id="authorChart"></canvas>

<script>
let papers = [];
let prismaCounts = {retrieved:0, duplicates:0, afterYear:0};

// MAIN FUNCTION
async function searchAll() {
    try {
        let query = document.getElementById("query").value;
        let yearFrom = document.getElementById("yearFrom").value;
        let yearTo = document.getElementById("yearTo").value;

        if (!query) {
            alert("Please enter a search query");
            return;
        }

        query = cleanQuery(query);
        console.log("Searching for:", query);

        let crossrefData = await fetchCrossRef(query);
        prismaCounts.retrieved = crossrefData.length;

        papers = mergeData(crossrefData);
        prismaCounts.duplicates = prismaCounts.retrieved - papers.length;

        papers = filterYear(papers, yearFrom, yearTo);
        prismaCounts.afterYear = papers.length;

        displaySummary();
        displayResults();
        drawTrendChart(papers);
        drawAuthorChart(papers);

    } catch (error) {
        console.error("Error:", error);
        alert("Something went wrong. Check console (F12).");
    }
}

// FETCH CROSSREF (max 1000)
async function fetchCrossRef(query) {
    let url = `https://api.crossref.org/works?query=${query}&rows=1000`;
    let res = await fetch(url, { headers: { "User-Agent": "ResearchExplorer/1.0" } });
    let data = await res.json();
    return data.message.items;
}

// CLEAN QUERY
function cleanQuery(query) {
    return query.replace(/AND/gi," ").replace(/OR/gi," ").replace(/NOT/gi,"");
}

// MERGE DATA
function mergeData(crossref) {
    let merged = [];
    crossref.forEach(p => {
        merged.push({
            title: normalizeTitle(p.title?.[0] || "No title"),
            authors: getAuthors(p),
            year: getYear(p),
            doi: p.DOI || "",
            journal: p["container-title"]?.[0] || ""
        });
    });
    return removeDuplicates(merged);
}

// NORMALIZE TITLE
function normalizeTitle(title) {
    return title.trim().toLowerCase().replace(/[^\w\s]/gi,"");
}

// REMOVE DUPLICATES
function removeDuplicates(data) {
    let seen = new Set();
    return data.filter(p => {
        if (seen.has(p.title)) return false;
        seen.add(p.title);
        return true;
    });
}

// FILTER BY YEAR
function filterYear(data, from, to) {
    return data.filter(p => {
        if (!p.year) return true;
        return (!from || p.year >= from) && (!to || p.year <= to);
    });
}

// GET YEAR (published-print > published-online > created)
function getYear(p) {
    return p['published-print']?.['date-parts']?.[0]?.[0] ||
           p['published-online']?.['date-parts']?.[0]?.[0] ||
           p.created?.['date-parts']?.[0]?.[0] || null;
}

// GET AUTHORS
function getAuthors(p) {
    if (!p.author) return "No authors";
    return p.author.map(a=>`${a.given||""} ${a.family||""}`.trim()).join("; ");
}

// DISPLAY SUMMARY (PRISMA-style)
function displaySummary() {
    document.getElementById("summary").innerText =
        `Total retrieved: ${prismaCounts.retrieved}, Duplicates removed: ${prismaCounts.duplicates}, After year filter: ${prismaCounts.afterYear}`;
}

// DISPLAY RESULTS
function displayResults() {
    let html = "";
    papers.forEach(p => {
        html += `
        <div>
            <b>${p.title}</b><br>
            ${p.authors}<br>
            ${p.journal}<br>
            ${p.year || "Year N/A"}<br>
            DOI: <a href="https://doi.org/${p.doi}" target="_blank">${p.doi}</a>
        </div><hr>`;
    });
    document.getElementById("results").innerHTML = html;
}

// CSV DOWNLOAD
function downloadCSV() {
    let csv = "Title,Authors,Journal,Year,DOI\n";
    papers.forEach(p => {
        csv += `"${p.title}","${p.authors}","${p.journal}","${p.year}","${p.doi}"\n`;
    });
    let blob = new Blob([csv], { type: "text/csv" });
    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "papers.csv";
    link.click();
}

// TREND CHART
function drawTrendChart(data) {
    if (!window.Chart) return;
    let count = {};
    data.forEach(p => { if(p.year) count[p.year]=(count[p.year]||0)+1; });
    let years = Object.keys(count).sort();
    let values = years.map(y=>count[y]);
    new Chart(document.getElementById("trendChart"), {
        type: "line",
        data: {
            labels: years,
            datasets: [{ label: "Publications", data: values, backgroundColor:"rgba(0,123,255,0.3)", borderColor:"rgba(0,80,200,1)", borderWidth:2, fill:true }]
        },
        options: { responsive:true, plugins:{ legend:{ display:true } } }
    });
}

// TOP AUTHORS CHART
function drawAuthorChart(data) {
    if (!window.Chart) return;
    let count = {};
    data.forEach(p=>{
        p.authors.split(";").forEach(a=>{
            let name = a.trim();
            if(!name) return;
            count[name]=(count[name]||0)+1;
        });
    });
    let top = Object.entries(count).sort((a,b)=>b[1]-a[1]).slice(0,10);
    new Chart(document.getElementById("authorChart"), {
        type:"bar",
        data: {
            labels: top.map(t=>t[0]),
            datasets: [{ label:"Top Authors", data:top.map(t=>t[1]), backgroundColor:"rgba(255,99,132,0.6)", borderColor:"rgba(200,50,80,1)", borderWidth:1 }]
        },
        options: { responsive:true, indexAxis:'y', plugins:{ legend:{ display:true } } }
    });
}
</script>

</body>
</html>
