<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Professional systematic review dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background:#f0f2f5; color:#2d3436; }
  h2 { color:#0984e3; margin-bottom:20px; }
  .container { display:flex; flex-wrap:wrap; gap:20px; }
  .left, .right { background:white; padding:20px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
  .left { flex:1 1 60%; min-width:400px; }
  .right { flex:1 1 35%; min-width:300px; }
  input { padding:8px; margin:5px 5px 5px 0; border-radius:4px; border:1px solid #ccc; width:120px; }
  button { padding:8px 15px; margin:5px 5px 5px 0; border:none; border-radius:4px; background:#0984e3; color:white; cursor:pointer; }
  button:hover { background:#0652dd; }
  #summary, #meta { margin:10px 0; font-weight:bold; }
  table { width:100%; border-collapse:collapse; margin-top:10px; }
  th, td { padding:10px; border-bottom:1px solid #eee; font-size:14px; text-align:left; }
  th { background:#0984e3; color:white; }
  tr:hover { background:#f1f2f6; }
  .abstract { font-size:13px; margin-top:5px; color:#636e72; display:none; padding-left:5px; }
  .show-btn { font-size:12px; color:#0984e3; cursor:pointer; text-decoration:underline; background:none; border:none; padding:0; }
  #loading { display:none; margin:10px 0; font-weight:bold; color:#d63031; }
  #charts canvas { margin-bottom:20px; background:white; border-radius:8px; padding:10px; }
</style>
</head>
<body>

<h2>Professional systematic review dashboard</h2>

<div class="container">
  <!-- LEFT COLUMN: Search + Table -->
  <div class="left">
    <div class="controls">
      <input type="text" id="query" placeholder="Keyword or Boolean query">
      <input type="number" id="yearFrom" placeholder="From Year">
      <input type="number" id="yearTo" placeholder="To Year">
      <button onclick="searchAll()">Search</button>
      <button onclick="downloadCSV()">Download CSV</button>
    </div>

    <div id="loading">🔄 Fetching papers, please wait...</div>

    <div id="summary"></div>

    <table id="resultsTable">
      <thead>
        <tr>
          <th>Title</th>
          <th>Authors</th>
          <th>Journal</th>
          <th>Year</th>
          <th>DOI</th>
        </tr>
      </thead>
      <tbody id="results"></tbody>
    </table>
  </div>

  <!-- RIGHT COLUMN: Charts + Meta -->
  <div class="right">
    <h3>Meta-analysis</h3>
    <div id="meta">Total papers: 0<br>Duplicates removed: 0<br>After year filter: 0</div>
    <div id="charts">
      <canvas id="trendChart"></canvas>
      <canvas id="authorChart"></canvas>
    </div>
  </div>
</div>

<script>
let papers = [];
let prismaCounts = {retrieved:0, duplicates:0, afterYear:0};
let trendChartInstance = null;
let authorChartInstance = null;

// SEARCH
async function searchAll() {
    let query = document.getElementById("query").value.trim();
    let yearFrom = document.getElementById("yearFrom").value;
    let yearTo = document.getElementById("yearTo").value;

    if(!query){ alert("Please enter a search query"); return; }

    document.getElementById("loading").style.display = "block";
    papers = [];
    prismaCounts = {retrieved:0, duplicates:0, afterYear:0};
    displaySummary();
    clearResults();
    clearCharts();

    try {
        query = cleanQuery(query);
        let crossrefData = await fetchCrossRef(query);
        prismaCounts.retrieved = crossrefData.length;

        papers = mergeData(crossrefData);
        prismaCounts.duplicates = prismaCounts.retrieved - papers.length;

        papers = filterYear(papers, yearFrom, yearTo);
        prismaCounts.afterYear = papers.length;

        displaySummary();
        displayResults();
        drawTrendChart(papers);
        drawAuthorChart(papers);
    } catch(err) {
        console.error(err);
        alert("Error fetching papers. Check console.");
    } finally {
        document.getElementById("loading").style.display = "none";
    }
}

// FETCH CROSSREF
async function fetchCrossRef(query) {
    let url = `https://api.crossref.org/works?query=${encodeURIComponent(query)}&rows=1000`;
    let res = await fetch(url, { headers:{ "User-Agent":"SystematicReviewDashboard/1.0" } });
    let data = await res.json();
    return data.message.items;
}

// CLEAN QUERY
function cleanQuery(q){ return q.replace(/AND/gi," ").replace(/OR/gi," ").replace(/NOT/gi,""); }

// MERGE DATA
function mergeData(items){
    let merged=[];
    items.forEach(p=>{
        merged.push({
            title: normalizeTitle(p.title?.[0]||"No title"),
            displayTitle: p.title?.[0]||"No title",
            authors: getAuthors(p),
            year: getYear(p),
            doi: p.DOI||"",
            journal: p["container-title"]?.[0]||"",
            abstract: p.abstract || ""
        });
    });
    return removeDuplicates(merged);
}

// NORMALIZE TITLE
function normalizeTitle(title){ return title.trim().toLowerCase().replace(/[^\w\s]/gi,""); }

// REMOVE DUPLICATES
function removeDuplicates(data){
    let seen = new Set();
    return data.filter(p=>{
        if(seen.has(p.title)) return false;
        seen.add(p.title);
        return true;
    });
}

// FILTER YEAR
function filterYear(data, from, to){
    return data.filter(p=>{
        if(!p.year) return true;
        return (!from||p.year>=from)&&(!to||p.year<=to);
    });
}

// GET YEAR PREFER PRINT->ONLINE->CREATED
function getYear(p){
    return p['published-print']?.['date-parts']?.[0]?.[0]||
           p['published-online']?.['date-parts']?.[0]?.[0]||
           p.created?.['date-parts']?.[0]?.[0]||null;
}

// GET AUTHORS
function getAuthors(p){
    if(!p.author) return "No authors";
    return p.author.map(a=>`${a.given||""} ${a.family||""}`.trim()).join("; ");
}

// DISPLAY SUMMARY
function displaySummary(){
    document.getElementById("summary").innerText=
        `Total retrieved: ${prismaCounts.retrieved}, Duplicates removed: ${prismaCounts.duplicates}, After year filter: ${prismaCounts.afterYear}`;
    document.getElementById("meta").innerHTML=
        `Total papers: ${prismaCounts.retrieved}<br>Duplicates removed: ${prismaCounts.duplicates}<br>After year filter: ${prismaCounts.afterYear}`;
}

// DISPLAY RESULTS
function displayResults(){
    let tbody=document.getElementById("results");
    papers.forEach((p,i)=>{
        let row=document.createElement("tr");
        row.innerHTML=`<td>${p.displayTitle}<br>${p.abstract? `<button class="show-btn" onclick="toggleAbstract(${i})">Show abstract</button><div id="abs${i}" class="abstract">${p.abstract}</div>` : ""}</td>
                         <td>${p.authors}</td>
                         <td>${p.journal}</td>
                         <td>${p.year||"N/A"}</td>
                         <td><a href="https://doi.org/${p.doi}" target="_blank">${p.doi}</a></td>`;
        tbody.appendChild(row);
    });
}

// TOGGLE ABSTRACT
function toggleAbstract(i){
    let el=document.getElementById(`abs${i}`);
    if(el.style.display==="none"||el.style.display==="") el.style.display="block";
    else el.style.display="none";
}

// CLEAR RESULTS
function clearResults(){ document.getElementById("results").innerHTML=""; }

// DOWNLOAD CSV
function downloadCSV(){
    if(!papers.length){ alert("No papers to download"); return; }
    let csv="Title,Authors,Journal,Year,DOI,Abstract\n";
    papers.forEach(p=>{ csv+=`"${p.displayTitle}","${p.authors}","${p.journal}","${p.year}","${p.doi}","${p.abstract.replace(/"/g,'""')}"\n`; });
    let blob=new Blob([csv], {type:"text/csv"});
    let link=document.createElement("a");
    link.href=URL.createObjectURL(blob);
    link.download="papers.csv";
    link.click();
}

// CLEAR CHARTS
function clearCharts(){
    if(trendChartInstance) { trendChartInstance.destroy(); trendChartInstance=null; }
    if(authorChartInstance) { authorChartInstance.destroy(); authorChartInstance=null; }
}

// TREND CHART
function drawTrendChart(data){
    let count={};
    data.forEach(p=>{ if(p.year) count[p.year]=(count[p.year]||0)+1; });
    let years=Object.keys(count).sort();
    let values=years.map(y=>count[y]);
    let ctx=document.getElementById("trendChart").getContext("2d");
    trendChartInstance=new Chart(ctx,{
        type:"line",
        data:{ labels:years, datasets:[{label:"Publications per Year", data:values, backgroundColor:"rgba(0,123,255,0.3)", borderColor:"rgba(0,80,200,1)", borderWidth:2, fill:true }]},
        options:{ responsive:true, plugins:{ legend:{ display:true } } }
    });
}

// TOP AUTHORS CHART
function drawAuthorChart(data){
    let count={};
    data.forEach(p=>{ p.authors.split(";").forEach(a=>{ let n=a.trim(); if(!n) return; count[n]=(count[n]||0)+1; }); });
    let top=Object.entries(count).sort((a,b)=>b[1]-a[1]).slice(0,10);
    let ctx=document.getElementById("authorChart").getContext("2d");
    authorChartInstance=new Chart(ctx,{
        type:"bar",
        data:{ labels:top.map(t=>t[0]), datasets:[{label:"Top Authors", data:top.map(t=>t[1]), backgroundColor:"rgba(255,99,132,0.6)", borderColor:"rgba(200,50,80,1)", borderWidth:1 }]},
        options:{ responsive:true, indexAxis:'y', plugins:{ legend:{ display:true } } }
    });
}
</script>

</body>
</html>
